<html>
<head>
  <style>
   .modalDialogRef1-2 {
      position: fixed;
      font-family: Arial;
      font-size: 20px;
      color: #f5bc10;
      text-align: left;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.8); /* Ajustado para que se vea oscuro */
      z-index: 99999;
      opacity: 0;
      -webkit-transition: opacity 400ms ease-in;
      -moz-transition: opacity 400ms ease-in;
      transition: opacity 400ms ease-in;
      pointer-events: none;
    }

    .modalDialogRef1-2:target {
      opacity: 1;
      pointer-events: auto;
    }

    .modalDialogRef1-2>div {
      width: 400px;
      position: relative;
      margin: 10% auto;
      padding: 5px 20px 13px 20px;
      border-radius: 10px;
      background: #3a3a3a;
      background: -moz-linear-gradient(#3a3a3a, #545454);
      background: -webkit-linear-gradient(#3a3a3a, #545454);
      background: -o-linear-gradient(#3a3a3a, #545454);
      text-align: justify;
      color: #fff;
    }

    .close {
      background: #545454;
      color: #FFFFFF;
      line-height: 25px;
      position: absolute;
      right: -12px;
      text-align: center;
      top: -10px;
      width: 24px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 1px 1px 3px #000;
    }

    .close:hover {
      background: #f5bc10;
    }

    /* Estilos para el buscador dentro del modal */
    .input-busqueda {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      box-sizing: border-box;
    }

    .btn-buscar {
      width: 100%;
      background-color: #f5bc10;
      color: #000;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-buscar:hover {
      background-color: #fbe08f;
    }
  </style>
</head>
<body>

<a href="#openModalRef1-2">Buscar Plano</a>

<div id="openModalRef1-2" class="modalDialogRef1-2">
  <div>
    <a href="#close" title="Close" class="close">X</a>
    <h2>Buscar Plano Escaneado</h2>
    <p style="font-size: 14px; color: #ccc;">
      <b>Letra + Nº de expediente:</b><br>
      Para buscar el plano se debe escribir la letra del expediente seguido de 8 dígitos numéricos. Si el nº no contiene 8 dígitos, completar con ceros (ejemplo: A00123456).
    </p>

    <!-- FORMULARIO DE BÚSQUEDA -->
    <form id="formPlano">
      <input type="text" id="expediente" class="input-busqueda" placeholder="Ej: A00123456" required>
      <button type="submit" class="btn-buscar">BUSCAR</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('formPlano').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const dato = document.getElementById('expediente').value.trim();
    
    if (dato) {
      // Construye la ruta al servidor local
      const ruta = `file://server06/catastrodigital/PLANOSARMADOS/${dato}.pdf`target="_blank";
      
      // Abre el archivo
      window.open(ruta, '_blank');
    }
  });
</script>

</body>
</html>
